<!DOCTYPE html>
<html>
<head>
  <title>Breakbulk Sea Routes</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- 🔥 GEODESIC (en önemli kısım) -->
  <script src="https://unpkg.com/leaflet.geodesic"></script>

  <style>
    body { margin:0; }
    #map { height: 100vh; }

    .legend, .controls {
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      font-size: 14px;
    }

    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
  <b>Carriers</b><br>
  <label><input type="checkbox" checked onchange="toggleLayer('onego')"> ONEGO</label><br>
  <label><input type="checkbox" checked onchange="toggleLayer('macs')"> MACS</label><br>
  <label><input type="checkbox" checked onchange="toggleLayer('arc')"> ARC</label><br>
  <label><input type="checkbox" checked onchange="toggleLayer('volans')"> VOLANS</label>
</div>

<script>

// MAP
const map = L.map('map').setView([25, -30], 3);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// LAYERS
const layers = {
  onego: L.layerGroup().addTo(map),
  macs: L.layerGroup().addTo(map),
  arc: L.layerGroup().addTo(map),
  volans: L.layerGroup().addTo(map)
};

// 🔥 GEODESIC DRAW
function draw(group, points, color, label) {
  const line = L.geodesic(points, {
    weight: 3,
    color: color,
    steps: 80
  });

  line.bindPopup(label);
  layers[group].addLayer(line);
}

// LOAD ROUTES
async function loadRoutes() {

  const res = await fetch('/routes.json');
  const routes = await res.json();

  // ONEGO
  draw("onego", routes.onego_antwerp_houston, "red", "ONEGO Antwerp → Houston");
  draw("onego", routes.onego_rotterdam_nola, "red", "ONEGO Rotterdam → New Orleans");

  // MACS
  draw("macs", routes.macs_hamburg_veracruz, "green", "MACS Hamburg → Veracruz");

  // ARC
  draw("arc", routes.arc_europe_us, "purple", "ARC Europe → US");

  // VOLANS
  draw("volans", routes.volans_rotterdam_callao, "orange", "VOLANS Rotterdam → Callao");
}

loadRoutes();

// TOGGLE
function toggleLayer(name) {
  if (map.hasLayer(layers[name])) {
    map.removeLayer(layers[name]);
  } else {
    map.addLayer(layers[name]);
  }
}

// PORTS
const ports = {
  Antwerp: [51.26,4.40],
  Rotterdam: [51.95,4.14],
  Hamburg: [53.55,9.99],
  Houston: [29.73,-95.27],
  "New Orleans": [29.95,-90.07],
  Veracruz: [19.20,-96.14],
  Baltimore: [39.27,-76.61],
  Callao: [-12.0,-77.0]
};

for (const p in ports) {
  L.marker(ports[p]).addTo(map).bindPopup(p);
}

// LEGEND
const legend = L.control({position:'bottomleft'});

legend.onAdd = function () {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = `
    <b>Legend</b><br>
    <span style="color:red">●</span> ONEGO<br>
    <span style="color:green">●</span> MACS<br>
    <span style="color:purple">●</span> ARC<br>
    <span style="color:orange">●</span> VOLANS
  `;
  return div;
};

legend.addTo(map);

</script>

</body>
</html>
