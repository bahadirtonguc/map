<!DOCTYPE html>
<html>
<head>
  <title>Breakbulk Trade Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
    .popup {
      font-family: Arial;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>

// MAP INIT
var map = L.map('map').setView([30, -20], 3);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// PORT COORDINATES
const ports = {
  antwerp: [51.26, 4.40],
  rotterdam: [51.95, 4.14],
  hamburg: [53.55, 9.99],
  houston: [29.73, -95.27],
  neworleans: [29.95, -90.07],
  mobile: [30.69, -88.04],
  baltimore: [39.27, -76.61],
  charleston: [32.78, -79.93],
  mexico: [19.20, -96.14],
  caribbean: [18.0, -66.0]
};

// ROUTES DATA
const carriers = [

  {
    name: "ONEGO",
    color: "red",
    routes: [
      ["antwerp", "houston"],
      ["rotterdam", "houston"],
      ["antwerp", "neworleans"]
    ],
    info: "North Europe → US Gulf liner-style. Steel & breakbulk specialist."
  },

  {
    name: "INTERMARINE",
    color: "blue",
    routes: [
      ["antwerp", "houston"],
      ["hamburg", "houston"],
      ["antwerp", "caribbean"]
    ],
    info: "Project cargo specialist. Flexible routing."
  },

  {
    name: "STINNES",
    color: "green",
    routes: [
      ["hamburg", "mexico"],
      ["antwerp", "mexico"],
      ["hamburg", "houston"]
    ],
    info: "Regular Europe ↔ Mexico / US Gulf liner service."
  },

  {
    name: "ARC",
    color: "purple",
    routes: [
      ["antwerp", "baltimore"],
      ["antwerp", "charleston"]
    ],
    info: "Ro-Ro + breakbulk hybrid operator."
  },

  {
    name: "VOLANS",
    color: "orange",
    routes: [
      ["antwerp", "houston"],
      ["rotterdam", "caribbean"]
    ],
    info: "Opportunistic MPP operator."
  }

];

// DRAW ROUTES
carriers.forEach(carrier => {
  carrier.routes.forEach(route => {

    let latlngs = [
      ports[route[0]],
      ports[route[1]]
    ];

    let line = L.polyline(latlngs, {
      color: carrier.color,
      weight: 3
    }).addTo(map);

    line.bindPopup(`
      <div class="popup">
        <b>${carrier.name}</b><br/>
        ${carrier.info}
      </div>
    `);
  });
});

</script>

</body>
</html>
