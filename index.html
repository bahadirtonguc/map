<!DOCTYPE html>
<html>
<head>
  <title>Breakbulk Sea Routes</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- GEODESIC (çalışmazsa fallback devreye girer) -->
  <script src="https://unpkg.com/leaflet.geodesic@2.7.0/dist/leaflet.geodesic.min.js"></script>

  <style>
    body { margin:0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>

// MAP
const map = L.map('map').setView([25, -30], 3);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// 🔥 DRAW (fallback’li)
function draw(points, color, label) {

  let line;

  if (L.geodesic) {
    // geodesic varsa
    line = L.geodesic(points, {
      weight: 3,
      color: color,
      steps: 80
    });
  } else {
    // fallback (garanti çalışır)
    line = L.polyline(points, {
      color: color,
      weight: 3
    });
  }

  line.addTo(map).bindPopup(label);
}

// ROUTES LOAD
async function loadRoutes() {

  const res = await fetch('/routes.json');
  const routes = await res.json();

  draw(routes.onego_antwerp_houston, "red", "ONEGO Antwerp → Houston");
  draw(routes.onego_rotterdam_nola, "red", "ONEGO Rotterdam → New Orleans");

  draw(routes.macs_hamburg_veracruz, "green", "MACS Hamburg → Veracruz");

  draw(routes.arc_europe_us, "purple", "ARC Europe → US");

  draw(routes.volans_rotterdam_callao, "orange", "VOLANS Rotterdam → Callao");
}

loadRoutes();

// PORTS
const ports = {
  Antwerp: [51.26,4.40],
  Rotterdam: [51.95,4.14],
  Hamburg: [53.55,9.99],
  Houston: [29.73,-95.27],
  "New Orleans": [29.95,-90.07],
  Veracruz: [19.20,-96.14],
  Baltimore: [39.27,-76.61],
  Callao: [-12.0,-77.0]
};

for (const p in ports) {
  L.marker(ports[p]).addTo(map).bindPopup(p);
}

</script>

</body>
</html>
