<!DOCTYPE html>
<html>
<head>
  <title>Breakbulk Sea Routes</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>

// ROUTE FUNCTION
function drawSeaRoute(points, color, carrierName, from, to) {

  const line = L.polyline(points, {
    color: color,
    weight: 3
  }).addTo(map);

  line.bindPopup(`
    <b>${carrierName}</b><br>
    ${from} → ${to}
  `);
}

// ROUTES

// ONEGO
drawSeaRoute([
  [51.26, 4.40],   // Antwerp
  [50.0, -5.0],    // Channel çıkış
  [40.0, -30.0],   // Atlantic
  [29.73, -95.27]  // Houston
], "red", "ONEGO", "Antwerp", "Houston");

// INTERMARINE
drawSeaRoute([
  [53.55, 9.99],   // Hamburg
  [50.0, -5.0],
  [35.0, -40.0],
  [29.73, -95.27]
], "blue", "INTERMARINE", "Hamburg", "Houston");

// STINNES (Mexico)
drawSeaRoute([
  [53.55, 9.99],
  [50.0, -5.0],
  [30.0, -50.0],
  [19.20, -96.14]
], "green", "STINNES", "Hamburg", "Veracruz");

// ARC
drawSeaRoute([
  [51.26, 4.40],
  [50.0, -5.0],
  [40.0, -40.0],
  [39.27, -76.61]
], "purple", "ARC", "Antwerp", "Baltimore");

// VOLANS
drawSeaRoute([
  [51.95, 4.14],
  [50.0, -5.0],
  [35.0, -45.0],
  [29.73, -95.27]
], "orange", "VOLANS", "Rotterdam", "Houston");

</script>

</body>
</html>
