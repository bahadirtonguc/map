<!DOCTYPE html>
<html>
<head>
  <title>Breakbulk Sea Routes</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; }
    #map { height: 100vh; }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
// MAP
const map = L.map('map').setView([25, -30], 3);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// API ROUTE DRAW
async function drawRealRoute(from, to, color, label) {
  try {
    const res = await fetch(`/api/route?from=${from}&to=${to}`);
    const data = await res.json();

    const coords = data.map(c => [c[1], c[0]]);

    L.polyline(coords, {
      color: color,
      weight: 3
    }).addTo(map).bindPopup(label);

  } catch (err) {
    console.error("Route error:", err);
  }
}

// ROUTES
drawRealRoute("antwerp", "houston", "red", "ONEGO Antwerp → Houston");
drawRealRoute("rotterdam", "neworleans", "red", "ONEGO Rotterdam → New Orleans");

drawRealRoute("hamburg", "veracruz", "green", "MACS Hamburg → Veracruz");

drawRealRoute("antwerp", "baltimore", "purple", "ARC Antwerp → Baltimore");

drawRealRoute("rotterdam", "callao", "orange", "VOLANS Rotterdam → Callao");

// PORT MARKERS
const ports = {
  Antwerp: [51.26,4.40],
  Rotterdam: [51.95,4.14],
  Hamburg: [53.55,9.99],
  Houston: [29.73,-95.27],
  "New Orleans": [29.95,-90.07],
  Veracruz: [19.20,-96.14],
  Baltimore: [39.27,-76.61],
  Callao: [-12.0,-77.0]
};

for (const p in ports) {
  L.marker(ports[p]).addTo(map).bindPopup(p);
}

// LEGEND
const legend = L.control({position:'bottomleft'});
legend.onAdd = function () {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = `
    <b>Carriers</b><br>
    <span style="color:red">●</span> ONEGO<br>
    <span style="color:green">●</span> MACS<br>
    <span style="color:purple">●</span> ARC<br>
    <span style="color:orange">●</span> VOLANS
  `;
  return div;
};
legend.addTo(map);

</script>
</body>
</html>
