<!DOCTYPE html>
<html>
<head>
  <title>Breakbulk Sea Routes</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>

const API_KEY = "BURAYA_API_KEY";

var map = L.map('map').setView([30, -20], 3);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// PORT KOORDINATLARI
const ports = {
  antwerp: {name:"Antwerp", coords:[4.40,51.26]},
  rotterdam: {name:"Rotterdam", coords:[4.14,51.95]},
  hamburg: {name:"Hamburg", coords:[9.99,53.55]},
  houston: {name:"Houston", coords:[-95.27,29.73]},
  neworleans: {name:"New Orleans", coords:[-90.07,29.95]},
  mexico: {name:"Veracruz", coords:[-96.14,19.20]},
  baltimore: {name:"Baltimore", coords:[-76.61,39.27]},
  charleston: {name:"Charleston", coords:[-79.93,32.78]}
};

// ROUTE FONKSİYONU (DENİZ ROTASI)
async function drawSeaRoute(from, to, color, carrierName) {

  const url = `https://api.openrouteservice.org/v2/directions/driving-car/geojson`;

  const body = {
    coordinates: [
      ports[from].coords,
      ports[to].coords
    ]
  };

  const res = await fetch(url, {
    method: "POST",
    headers: {
      "Authorization": API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });

  const data = await res.json();

  const route = data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);

  const line = L.polyline(route, {
    color: color,
    weight: 3
  }).addTo(map);

  line.bindPopup(`
    <b>${carrierName}</b><br>
    ${ports[from].name} → ${ports[to].name}
  `);
}

// ROUTES
drawSeaRoute("antwerp","houston","red","ONEGO");
drawSeaRoute("rotterdam","houston","red","ONEGO");

drawSeaRoute("antwerp","houston","blue","INTERMARINE");
drawSeaRoute("hamburg","houston","blue","INTERMARINE");

drawSeaRoute("hamburg","mexico","green","STINNES");

drawSeaRoute("antwerp","baltimore","purple","ARC");

drawSeaRoute("antwerp","houston","orange","VOLANS");

</script>

</body>
</html>
